function curYear(){return settings.year;}
function weeksInYear(y){return settings.weeks[y]||26;}

function monthlyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt*52/12:freq==="Fortnightly"?amt*26/12:freq==="Monthly"?amt:freq==="Quarterly"?amt/3:freq==="Annually"?amt/12:amt;}
function weeklyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt:freq==="Fortnightly"?amt/2:freq==="Monthly"?amt*12/52:freq==="Quarterly"?amt*4/52:freq==="Annually"?amt/52:amt;}
function nextDue(day){if(!day||day<1)return null;var now=new Date();now.setHours(0,0,0,0);for(var a=0;a<70;a++){var d=new Date(now);d.setDate(d.getDate()+a);if(d.getDate()===day)return d;}return null;}
function daysUntil(day){var d=nextDue(day);if(!d)return null;return Math.round((d-new Date().setHours(0,0,0,0))/86400000);}

/* cells keyed by year|catId|wi */
function cellKey(y,catId,wi){return y+"|"+catId+"|"+wi;}
function getCell(catId,wi){return cells[cellKey(curYear(),catId,wi)]||null;}
function setCell(catId,wi,obj){var k=cellKey(curYear(),catId,wi);if(obj==null)delete cells[k];else cells[k]=obj;saveCells();}

function rowIdsByGroup(){
 var inc={},out={};
 cats.forEach(function(c){if(c.kind==="income")inc[c.id]=1;else out[c.id]=1;});
 bills.forEach(function(b){out[billCatId(b)]=1;});
 loans.forEach(function(l){out[loanCatId(l)]=1;});
 return {inc:inc,out:out};
}
function yWeekIncome(y,wi){var s=0;var g=rowIdsByGroup();Object.keys(g.inc).forEach(function(id){var e=cells[cellKey(y,id,wi)];if(e)s+=e.amt;});return s;}
function yWeekOut(y,wi,method){var s=0;var g=rowIdsByGroup();Object.keys(g.out).forEach(function(id){var e=cells[cellKey(y,id,wi)];if(e&&e.method===method)s+=e.amt;});return s;}
function weekIncome(wi){return yWeekIncome(curYear(),wi);}
function weekCashOut(wi){return yWeekOut(curYear(),wi,"cash");}
function weekCardOut(wi){return yWeekOut(curYear(),wi,"card");}
function weekAfterOut(wi){return yWeekOut(curYear(),wi,"after");}
function weekPotOut(wi){return yWeekOut(curYear(),wi,"pot");}

/* running cash across ALL years up to current year+week (chronological) */
function allYears(){return Object.keys(settings.weeks).map(Number).sort(function(a,b){return a-b;});}
function totalReserved(){return pots.reduce(function(s,p){return s+(p.reserved||0);},0);}
/* free cash = opening + all income - all cash spends - all reservations(net) ; but reservations move free->pot,
   and pot spends reduce pot. So: freeCash = opening + sum(income) - sum(cashOut) - sum(reservedNet)
   where reservedNet = current total reserved in pots. Pot spends already reduced pot, not cash. */
function sumIncomeAll(){var s=0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekIncome(y,wi);});return s;}
function sumCashOutAll(){var s=0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekOut(y,wi,"cash");});return s;}
function freeCash(){return (settings.opening||0)+sumIncomeAll()-sumCashOutAll()-totalReserved();}
function totalCash(){return freeCash()+totalReserved();}
/* running cash balance per week within current year (free cash trajectory) */
function runningCashWeek(wi){
 var bal=settings.opening||0;
 // include prior years fully
 allYears().forEach(function(y){if(y<curYear()){for(var w=0;w<weeksInYear(y);w++)bal+=yWeekIncome(y,w)-yWeekOut(y,w,"cash");}});
 for(var i=0;i<=wi;i++)bal+=weekIncome(i)-weekCashOut(i);
 bal-=totalReserved(); // reservations set aside
 return bal;
}

function loanCurrentBalance(l){var nm=(l.name||"").toLowerCase();
 if(nm.indexOf("credit")>=0||nm.indexOf("card")>=0)return ccBalance();
 if(nm.indexOf("afterpay")>=0)return apBalance();
 return (l.total||0)-loanPayments(l);
}
function loanByMatch(kw){return loans.filter(function(l){return (l.name||"").toLowerCase().indexOf(kw)>=0;})[0];}
// payments toward a loan = cash/pot logged on that loan's grid row
function loanPayments(l){var s=0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++){var e=cells[cellKey(y,loanCatId(l),wi)];if(e&&(e.method==="cash"||e.method==="pot"))s+=e.amt;}});return s;}
// card spends = 'card' method anywhere EXCEPT on the card loan row (that row is for payments)
function methodSpendExcludingLoanRow(method,loanRowId){var s=0;var g=rowIdsByGroup();allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++){Object.keys(g.out).forEach(function(id){if(id===loanRowId)return;var e=cells[cellKey(y,id,wi)];if(e&&e.method===method)s+=e.amt;});}});return s;}

function ccBalance(){var cc=loanByMatch("credit");var s=settings.ccStart||0;s+=methodSpendExcludingLoanRow("card",cc?loanCatId(cc):null);if(cc)s-=loanPayments(cc);return s;}
function apBalance(){var ap=loanByMatch("afterpay");var s=settings.apStart||0;s+=methodSpendExcludingLoanRow("after",ap?loanCatId(ap):null);if(ap)s-=loanPayments(ap);return s;}

function cellMonthKey(year,wi){var d=weekDate(year,wi);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function allMonthKeys(){
 var set={};
 Object.keys(cells).forEach(function(k){var parts=k.split("|");var y=parseInt(parts[0]);var wi=parseInt(parts[2]);if(!isNaN(y)&&!isNaN(wi))set[cellMonthKey(y,wi)]=1;});
 var arr=Object.keys(set).sort();
 if(arr.length===0){var now=new Date();arr=[now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")];}
 return arr;
}
function monthLabel(mk){var p=mk.split("-");var d=new Date(parseInt(p[0]),parseInt(p[1])-1,1);return d.toLocaleDateString(undefined,{month:"long",year:"numeric"});}
// spending by category for a given month key, returns [{name,total,cash,card,after,pot}]
function spendByCategoryForMonth(mk){
 var map={};
 Object.keys(cells).forEach(function(k){
   var parts=k.split("|");var y=parseInt(parts[0]);var catId=parts[1];var wi=parseInt(parts[2]);
   if(isNaN(y)||isNaN(wi))return;
   if(cellMonthKey(y,wi)!==mk)return;
   var cat=cats.filter(function(c){return c.id===catId;})[0];
   if(!cat||cat.kind!=="expense")return;
   var e=cells[k];if(!e)return;
   if(!map[catId])map[catId]={name:cat.name,total:0,cash:0,card:0,after:0,pot:0};
   map[catId].total+=e.amt;map[catId][e.method]=(map[catId][e.method]||0)+e.amt;
 });
 return Object.keys(map).map(function(id){return map[id];}).sort(function(a,b){return b.total-a.total;});

function addCat(){var name=prompt("Category name:","");if(!name)return;var inc=confirm("Income? OK=Income, Cancel=Expense");cats.push({id:uid(),name:name.trim(),kind:inc?"income":"expense"});saveCats();render();}
function renameCat(c){var n=prompt("Rename (blank=delete):",c.name);if(n===null)return;if(n.trim()===""){if(confirm("Delete "+c.name+"?")){cats=cats.filter(function(x){return x.id!==c.id;});saveCats();render();}return;}c.name=n.trim();saveCats();render();}
function editSettings(){var o=prompt("Opening cash ($):",String(settings.opening||0));if(o!==null)settings.opening=parseFloat(o)||0;var cc=prompt("Starting credit card ($):",String(settings.ccStart||0));if(cc!==null)settings.ccStart=parseFloat(cc)||0;var ap=prompt("Starting Afterpay ($):",String(settings.apStart||0));if(ap!==null)settings.apStart=parseFloat(ap)||0;saveSettings();render();}

/* ============ BILLS (table) ============ */
function renderBills(wrap){
 var totalM=bills.reduce(function(s,b){return s+monthlyEq(b.amount,b.freq);},0);
 wrap.appendChild(h("div",{style:"font-size:12.5px;color:"+C.faint+";margin-bottom:10px;"},["Total ~"+money0(totalM)+"/month. Tap any field to edit."]));
 wrap.appendChild(sortBar([{label:"Name",fn:function(){sortBills("name");}},{label:"Amount",fn:function(){sortBills("amount");}},{label:"Due date",fn:function(){sortBills("due");}}]));
 var box=h("div",{class:"gridwrap",style:"border:1px solid "+C.rule+";border-radius:10px;background:"+C.card+";"});
 var tbl=h("table",{style:"width:100%;font-size:12.5px;"});
 var hdr=h("tr",{});["Bill","Amount","Term","Due","Note",""].forEach(function(hh){hdr.appendChild(h("th",{style:"position:sticky;top:0;z-index:10;background:"+C.ink+";color:#fff;padding:7px 8px;text-align:left;font-size:11px;"},[hh]));});
 tbl.appendChild(hdr);
 bills.forEach(function(b){tbl.appendChild(billRow(b));});
 box.appendChild(tbl);wrap.appendChild(box);
 wrap.appendChild(h("button",{style:"width:100%;border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:10px;padding:12px;font-size:13px;font-weight:600;margin-top:10px;",
   onclick:function(){bills.push({id:uid(),name:"New bill",amount:0,freq:"Monthly",due:1,note:""});saveBills();render();}},["+ Add a bill"]));
}
function billRow(b){
 var tr=h("tr",{});
 function ed(val,fmt,setter,wid){var inp=h("input",{value:val,style:"width:"+(wid||"100%")+";border:1px solid transparent;background:transparent;padding:6px 6px;font-size:12.5px;color:"+C.ink+";border-radius:5px;"});
   inp.addEventListener("focus",function(){inp.style.border="1px solid "+C.rule;inp.style.background="#fff";});
   inp.addEventListener("change",function(e){setter(e.target.value);saveBills();render();});
   inp.addEventListener("blur",function(){inp.style.border="1px solid transparent";inp.style.background="transparent";});
   var td=h("td",{style:"border-top:1px solid "+C.rule+";padding:0;"});td.appendChild(inp);return td;}
 tr.appendChild(ed(b.name,null,function(v){b.name=v;}));
 tr.appendChild(ed(money0(b.amount),null,function(v){b.amount=parseFloat(String(v).replace(/[^0-9.]/g,""))||0;}));
 // term as select
 var tsel=h("select",{style:"border:1px solid transparent;background:transparent;padding:6px;font-size:12px;"});
 ["Weekly","Fortnightly","Monthly","Quarterly","Annually"].forEach(function(f){var o=h("option",{value:f},[f]);if(f===b.freq)o.setAttribute("selected","selected");tsel.appendChild(o);});
 tsel.addEventListener("change",function(e){b.freq=e.target.value;saveBills();render();});
 var tdT=h("td",{style:"border-top:1px solid "+C.rule+";padding:0;"});tdT.appendChild(tsel);tr.appendChild(tdT);
 tr.appendChild(ed(String(b.due),null,function(v){b.due=parseInt(v)||1;},"44px"));
 tr.appendChild(ed(b.note||"",null,function(v){b.note=v;}));
 var del=h("td",{style:"border-top:1px solid "+C.rule+";padding:0 6px;text-align:center;"},[h("button",{style:"border:none;background:none;color:"+C.red+";font-size:14px;",onclick:function(){if(confirm("Remove "+b.name+"?")){bills=bills.filter(function(x){return x.id!==b.id;});saveBills();render();}}},["×"])]);
 tr.appendChild(del);return tr;
}

/* ============ LOANS — amortisation ============ */
function renderLoans(wrap){
 if(!state.loanOpen)state.loanOpen={};
 var totalOwed=loans.reduce(function(s,l){return s+Math.max(0,loanCurrentBalance(l));},0);
 wrap.appendChild(sticky(h("div",{style:"background:"+C.card+";border:1.5px solid "+C.rule+";border-radius:12px;padding:13px 15px;margin-bottom:14px;"},[
   h("div",{style:"font-size:11px;color:"+C.faint+";font-weight:600;"},["Total still owed (live)"]),
   h("div",{style:"font-family:Georgia,serif;font-size:22px;font-weight:700;"},[money(totalOwed)]),
   h("div",{style:"font-size:11.5px;color:"+C.faint+";margin-top:3px;"},["Log payments (and card/afterpay spends) in the Weekly tab. Tap a loan to see its schedule."])]),0));
 wrap.appendChild(sortBar([{label:"Name",fn:function(){sortLoans("name");}},{label:"Balance",fn:function(){sortLoans("balance");}},{label:"Due date",fn:function(){sortLoans("due");}}]));
 loans.forEach(function(l){
   var nm=(l.name||"").toLowerCase();
   var isCard=nm.indexOf("credit")>=0||nm.indexOf("card")>=0;
   var isAfter=nm.indexOf("afterpay")>=0;
   var opening=isCard?(settings.ccStart||0):isAfter?(settings.apStart||0):(l.total||0);
   var bal=loanCurrentBalance(l);
   var pays=loanPayments(l);
   var spends=isCard?methodSpendExcludingLoanRow("card",loanCatId(l)):isAfter?methodSpendExcludingLoanRow("after",loanCatId(l)):0;
   var open=!!state.loanOpen[l.id];
   var head=h("div",{style:"display:flex;justify-content:space-between;align-items:center;cursor:pointer;",onclick:function(){state.loanOpen[l.id]=!open;render();}},[
     h("div",{},[h("span",{style:"font-size:15px;font-weight:700;"},[l.name]),h("span",{style:"font-size:11px;color:"+C.faint+";margin-left:7px;"},[(isCard||isAfter)?"card/spend":l.freq+" · due "+l.due])]),
     h("div",{style:"display:flex;align-items:center;gap:9px;"},[h("span",{style:"font-size:16px;font-weight:700;color:"+(bal<=0?C.green:C.ink)+";"},[bal<=0?"CLEARED ✓":money(bal)]),h("span",{style:"color:"+C.faint+";font-size:13px;"},[open?"▲":"▼"])])
   ]);
   var card=h("div",{style:"background:"+C.card+";border:1px solid "+C.rule+";border-radius:11px;padding:12px 14px;margin-bottom:9px;"},[head]);
   if(open){
     var sched=h("div",{style:"margin-top:11px;border-top:1px solid "+C.rule+";padding-top:10px;"});
     // summary line
     sched.appendChild(amLine("Opening balance",opening,C.faint));
     if(isCard||isAfter)sched.appendChild(amLine("+ Spends logged",spends,C.red));
     sched.appendChild(amLine("− Payments made",-pays,C.green));
     sched.appendChild(amLine("= Current balance",bal,bal<=0?C.green:C.ink,true));
     // per-week schedule (only weeks with activity on this loan)
     var rows=[];
     allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++){
       var e=cells[cellKey(y,loanCatId(l),wi)];
       if(e){rows.push({y:y,wi:wi,date:weekDate(y,wi),amt:e.amt,method:e.method});}
     }});
     if(rows.length){
       var tbl=h("div",{style:"margin-top:11px;"});
       tbl.appendChild(h("div",{style:"font-size:10.5px;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin-bottom:6px;"},["Payment history"]));
       var run=opening; if(isCard||isAfter)run+=spends; // start from opening(+spends) then subtract chronologically
       // sort by date
       rows.sort(function(a,b){return a.date-b.date;});
       rows.forEach(function(r){
         var isPay=(r.method==="cash"||r.method==="pot");
         if(isPay)run-=r.amt;
         tbl.appendChild(h("div",{style:"display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-top:1px solid "+C.rule+";"},[
           h("span",{style:"color:"+C.faint+";"},["W"+(r.wi+1)+" · "+r.date.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"2-digit"})]),
           h("span",{style:"color:"+(isPay?C.green:C.red)+";font-weight:600;"},[(isPay?"− ":"+ ")+money0(r.amt)+" "+(r.method==="cash"?"cash":r.method==="pot"?"pot":r.method)]),
           h("span",{style:"font-weight:700;"},[money0(run)])
         ]));
       });
       sched.appendChild(tbl);
     } else {
       sched.appendChild(h("div",{style:"font-size:12px;color:"+C.faint+";margin-top:9px;"},["No payments logged yet. Log them on the Weekly tab under '"+l.name+"'."]));
     }
     // edit/remove
     sched.appendChild(h("div",{style:"display:flex;gap:12px;margin-top:11px;"},[
       h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",onclick:function(){editLoanInline(l);}},["edit details"]),
       h("button",{style:"border:none;background:none;color:"+C.red+";font-size:11.5px;text-decoration:underline;",onclick:function(){if(confirm("Remove "+l.name+"?")){loans=loans.filter(function(x){return x.id!==l.id;});saveLoans();render();}}},["remove"])
     ]));
     card.appendChild(sched);
   }
   wrap.appendChild(card);
 });
 wrap.appendChild(h("button",{style:"width:100%;border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:11px;padding:13px;font-size:14px;font-weight:600;margin-top:4px;",
   onclick:function(){loans.push({id:uid(),name:"New loan",total:0,freq:"Monthly",due:1,note:""});saveLoans();render();}},["+ Add a loan / card"]));
}
function amLine(label,val,color,bold){return h("div",{style:"display:flex;justify-content:space-between;font-size:13px;padding:3px 0;"+(bold?"border-top:1px solid "+C.rule+";margin-top:4px;padding-top:7px;":""),},[
  h("span",{style:"font-weight:"+(bold?"700":"500")+";"},[label]),h("span",{style:"font-weight:700;color:"+color+";"},[money(Math.abs(val))])]);}
function editLoanInline(l){
 var name=prompt("Name:",l.name);if(name===null)return;
 var nm=name.toLowerCase();
 if(nm.indexOf("credit")>=0||nm.indexOf("card")>=0){var o=prompt("Opening credit card balance ($):",String(settings.ccStart||0));if(o!==null){settings.ccStart=parseFloat(o)||0;saveSettings();}}
 else if(nm.indexOf("afterpay")>=0){var o2=prompt("Opening Afterpay balance ($):",String(settings.apStart||0));if(o2!==null){settings.apStart=parseFloat(o2)||0;saveSettings();}}
 else {var t=prompt("Total owed ($):",String(l.total));if(t!==null)l.total=parseFloat(t)||0;}
 l.name=name.trim();
 var freq=prompt("Term:",l.freq||"Monthly");if(freq!==null)l.freq=freq.trim();
 var due=prompt("Due day (1-31):",String(l.due||1));if(due!==null)l.due=parseInt(due)||1;
 saveLoans();render();
}

/* ============ POTS ============ */
function renderPots(wrap){
 wrap.appendChild(sticky(h("div",{style:"background:"+C.card+";border:1.5px solid "+C.rule+";border-radius:12px;padding:13px 15px;margin-bottom:14px;"},[
   h("div",{style:"display:flex;justify-content:space-between;"},[
     h("div",{},[h("div",{style:"font-size:11px;color:"+C.faint+";font-weight:600;"},["Total reserved in pots"]),h("div",{style:"font-family:Georgia,serif;font-size:22px;font-weight:700;color:"+C.pot+";"},[money(totalReserved())])]),
     h("div",{style:"text-align:right;"},[h("div",{style:"font-size:11px;color:"+C.faint+";font-weight:600;"},["Free cash left"]),h("div",{style:"font-size:15px;font-weight:700;margin-top:4px;color:"+(freeCash()<0?C.red:C.ink)+";"},[money(freeCash())])])])]),0));
 wrap.appendChild(h("div",{style:"font-size:12px;color:"+C.faint+";margin-bottom:10px;"},["Reserving moves money from free cash into a pot. Paying from a pot (in the weekly tracker) reduces it."]));
 wrap.appendChild(sortBar([{label:"Name",fn:function(){sortPots("name");}},{label:"Reserved",fn:function(){sortPots("reserved");}}]));
 pots.forEach(function(p){
   var addInp=h("input",{inputmode:"decimal",placeholder:"reserve $",style:"flex:1;border:1px solid "+C.rule+";background:"+C.paper+";border-radius:8px;padding:8px 10px 8px 20px;font-weight:700;font-size:13px;color:"+C.ink+";"});
   wrap.appendChild(h("div",{style:"background:"+C.card+";border:1px solid "+C.rule+";border-radius:11px;padding:12px 14px;margin-bottom:9px;"},[
     h("div",{style:"display:flex;justify-content:space-between;align-items:baseline;"},[
       h("span",{style:"font-size:15px;font-weight:700;"},[p.name]),
       h("span",{style:"font-size:16px;font-weight:700;color:"+C.pot+";"},[money(p.reserved||0)])]),
     h("div",{style:"display:flex;gap:7px;margin-top:9px;"},[
       h("div",{style:"position:relative;flex:1;"},[h("span",{style:"position:absolute;left:8px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:13px;"},["$"]),addInp]),
       h("button",{style:"border:none;background:"+C.pot+";color:#fff;border-radius:8px;padding:0 14px;font-size:12.5px;font-weight:700;",onclick:function(){var v=parseFloat(addInp.value);if(!v||v<=0)return;p.reserved=(p.reserved||0)+v;savePots();render();}},["+ Reserve"]),
       h("button",{style:"border:1px solid "+C.rule+";background:#fff;color:"+C.ink+";border-radius:8px;padding:0 12px;font-size:12.5px;font-weight:700;",onclick:function(){var v=parseFloat(addInp.value);if(!v||v<=0)return;p.reserved=Math.max(0,(p.reserved||0)-v);savePots();render();}},["− Unreserve"])]),
     h("div",{style:"display:flex;gap:12px;margin-top:9px;"},[
       h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",onclick:function(){var n=prompt("Rename pot:",p.name);if(n&&n.trim()){p.name=n.trim();savePots();render();}}},["rename"]),
       h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",onclick:function(){if(confirm("Delete "+p.name+"? Reserved money returns to free cash.")){pots=pots.filter(function(x){return x.id!==p.id;});savePots();render();}}},["delete"])])]));
 });
 wrap.appendChild(h("button",{style:"width:100%;border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:11px;padding:13px;font-size:14px;font-weight:600;margin-top:4px;",
   onclick:function(){var n=prompt("New pot name:","");if(n&&n.trim()){pots.push({id:uid(),name:n.trim(),reserved:0});savePots();render();}}},["+ Add a pot"]));
}

render();
cloudLoad(function(){refresh();render();});
</script>
