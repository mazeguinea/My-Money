<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1B1916"/>
<title>Weekly Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:#F6F2E9;color:#1B1916;font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,sans-serif;}
  input::placeholder{color:#8B847A;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  input:focus-visible,button:focus-visible{outline:2px solid #1B1916;outline-offset:2px;}
  .bar{transition:width .4s ease;}
  table{border-collapse:collapse;}
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   PASTE YOUR SUPABASE VALUES (same project as before).
   ============================================================ */
var SUPABASE_URL = "https://sxfenjxzrhavutolxjmk.supabase.co";
var SUPABASE_KEY = "sb_publishable_bjROj1N5hNGw0jcuK0vbQQ_LOQcSbH7";
/* ============================================================ */
var sb=null;
if(SUPABASE_URL&&SUPABASE_KEY&&window.supabase){try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){sb=null;}}
var CLOUD=!!sb;

var C={paper:"#F6F2E9",ink:"#1B1916",faint:"#8B847A",rule:"#DCD4C6",card:"#FFFFFF",
red:"#B23A2E",redSoft:"#FAECEA",green:"#2E7D5B",greenSoft:"#E8F2EC",amber:"#B8860B",
cash:"#2E7D5B",cashBg:"#DDEEE4",card_:"#C9A227",cardBg:"#FBF1C9",after:"#2C6FB0",afterBg:"#D6E6F5",gold:"#A9802B"};

/* ---------- storage (wt_ keys; cloud + local) ---------- */
function lget(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,v);}catch(e){}}
var _cache={};
function loadJSON(k,def){if(k in _cache){try{return JSON.parse(_cache[k]);}catch(e){}}var v=lget(k);if(v===null)return def;try{return JSON.parse(v);}catch(e){return def;}}
function saveJSON(k,o){var s=JSON.stringify(o);_cache[k]=s;lset(k,s);if(CLOUD){sb.from("kv").upsert({k:k,v:s}).then(function(){},function(){});}}
function cloudLoad(cb){if(!CLOUD){cb();return;}sb.from("kv").select("k,v").like("k","wt_%").then(function(res){if(res&&res.data){res.data.forEach(function(r){_cache[r.k]=r.v;lset(r.k,r.v);});}cb();},function(){cb();});}

function money(n){n=n||0;return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function money0(n){n=n||0;return (n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function uid(){return "x"+Date.now()+Math.floor(Math.random()*999);}

/* ---------- data model ----------
   categories: [{id,name,kind:'income'|'expense'}]
   weeks: array of ISO monday strings (generated)
   cells: { "catId|weekIdx": {amt, method:'cash'|'card'|'after'} }  (income always cash-like, no method)
   settings: { opening, ccStart, apStart }
*/
var DEFAULT_CATS=[
 {id:"inc1",name:"Wages",kind:"income"},
 {id:"inc2",name:"Other Income",kind:"income"},
 {id:"c1",name:"Rent",kind:"expense"},
 {id:"c2",name:"Groceries",kind:"expense"},
 {id:"c3",name:"Eat Out",kind:"expense"},
 {id:"c4",name:"Transport",kind:"expense"},
 {id:"c5",name:"Workouts",kind:"expense"},
 {id:"c6",name:"Clothing",kind:"expense"},
 {id:"c7",name:"Entertainment",kind:"expense"},
 {id:"c8",name:"Bills",kind:"expense"},
 {id:"c9",name:"One-off",kind:"expense"}
];

var cats, cells, settings;
function refresh(){
 cats=loadJSON("wt_cats",DEFAULT_CATS);
 cells=loadJSON("wt_cells",{});
 settings=loadJSON("wt_settings",{opening:653.82,ccStart:0,apStart:0});
}
refresh();
function saveCats(){saveJSON("wt_cats",cats);}
function saveCells(){saveJSON("wt_cells",cells);}
function saveSettings(){saveJSON("wt_settings",settings);}

/* weeks: 13 mondays starting this week's monday */
function mondayOf(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);return x;}
var NWEEKS=13;
function weekDates(){var base=mondayOf(new Date());var a=[];for(var i=0;i<NWEEKS;i++){var d=new Date(base);d.setDate(d.getDate()+i*7);a.push(d);}return a;}
function wlabel(d){return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}

var state={editCell:null, tab:"grid", scrollWeek:0};

function cellKey(catId,wi){return catId+"|"+wi;}
function getCell(catId,wi){return cells[cellKey(catId,wi)]||null;}

/* ---------- totals ---------- */
function weekIncome(wi){var s=0;cats.forEach(function(c){if(c.kind==="income"){var e=getCell(c.id,wi);if(e)s+=e.amt;}});return s;}
function weekCashOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="cash")s+=e.amt;}});return s;}
function weekCardOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="card")s+=e.amt;}});return s;}
function weekAfterOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="after")s+=e.amt;}});return s;}
function weekSpendTotal(wi){return weekCashOut(wi)+weekCardOut(wi)+weekAfterOut(wi);}
/* running cash balance only reduced by cash spends */
function runningCash(wi){var bal=settings.opening||0;for(var i=0;i<=wi;i++){bal+=weekIncome(i)-weekCashOut(i);}return bal;}
function ccBalance(uptoWi){var bal=settings.ccStart||0;for(var i=0;i<=uptoWi;i++){bal+=weekCardOut(i);}return bal;}
function apBalance(uptoWi){var bal=settings.apStart||0;for(var i=0;i<=uptoWi;i++){bal+=weekAfterOut(i);}return bal;}

function h(tag,attrs,kids){var e=document.createElement(tag);
 for(var k in attrs){if(k==="style")e.setAttribute("style",attrs[k]);
   else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
   else if(k==="html")e.innerHTML=attrs[k];else if(k==="class")e.className=attrs[k];else e.setAttribute(k,attrs[k]);}
 (kids||[]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
 return e;}

function methodColors(method){
 if(method==="cash")return {bg:C.cashBg,fg:C.cash};
 if(method==="card")return {bg:C.cardBg,fg:C.card_};
 if(method==="after")return {bg:C.afterBg,fg:C.after};
 return {bg:"#fff",fg:C.ink};
}

function render(){
 var root=document.getElementById("app");root.innerHTML="";
 var wrap=h("div",{style:"max-width:920px;margin:0 auto;padding:20px 12px 44px;"});
 wrap.appendChild(h("div",{style:"margin-bottom:6px;"},[
   h("div",{style:"font-size:11px;letter-spacing:.2em;color:"+C.gold+";font-weight:700;"},["WEEKLY TRACKER"]),
   h("h1",{style:"font-family:Georgia,serif;font-size:26px;line-height:1.05;margin-top:5px;font-weight:700;"},["This week, by colour"])
 ]));
 wrap.appendChild(h("div",{style:"display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:99px;margin-bottom:12px;"+
   (CLOUD?"background:"+C.greenSoft+";color:"+C.green+";border:1px solid "+C.green:"background:#FBF2DC;color:"+C.amber+";border:1px solid "+C.amber)},
   [CLOUD?"☁ SYNCED TO CLOUD":"⚠ THIS DEVICE ONLY"]));

 // legend
 wrap.appendChild(h("div",{style:"display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;"},[
   legendDot(C.cash,"Cash"),legendDot(C.card_,"Credit card"),legendDot(C.after,"Afterpay")
 ]));

 // balances row
 var lastWi=NWEEKS-1;
 wrap.appendChild(h("div",{style:"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;"},[
   balCard("Cash balance",runningCash(currentWeekIndex()),C.ink,"now"),
   balCard("Credit card",ccBalance(lastWi),C.card_,"owed"),
   balCard("Afterpay",apBalance(lastWi),C.after,"owed")
 ]));

 if(state.editCell)wrap.appendChild(renderEditor());

 wrap.appendChild(renderGrid());

 // add category + settings
 wrap.appendChild(h("div",{style:"display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;"},[
   h("button",{style:"border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;",
     onclick:function(){addCategory();}},["+ Add category"]),
   h("button",{style:"border:1px solid "+C.rule+";background:"+C.card+";color:"+C.ink+";border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;",
     onclick:function(){editSettings();}},["⚙ Opening / start balances"])
 ]));

 wrap.appendChild(h("div",{style:"font-size:11px;color:"+C.faint+";text-align:center;line-height:1.5;margin-top:16px;"},
   ["Tap any cell to log an amount and choose Cash / Card / Afterpay. Card & Afterpay add to those balances; only cash reduces your cash balance."]));
 root.appendChild(wrap);
}
function legendDot(color,label){return h("span",{style:"display:flex;align-items:center;gap:6px;"},[
  h("span",{style:"width:13px;height:13px;border-radius:3px;background:"+color+";display:inline-block;"},[]),
  h("span",{style:"color:"+C.ink+";font-weight:600;"},[label])]);}
function balCard(label,val,color,suffix){return h("div",{style:"background:"+C.card+";border:1.5px solid "+C.rule+";border-radius:12px;padding:12px 13px;"},[
  h("div",{style:"font-size:11px;color:"+C.faint+";font-weight:600;"},[label]),
  h("div",{style:"font-family:Georgia,serif;font-size:20px;font-weight:700;margin-top:2px;color:"+(val<0&&suffix==="now"?C.red:color)+";"},[money0(val)]),
  h("div",{style:"font-size:10px;color:"+C.faint+";"},[suffix])]);}

function currentWeekIndex(){return 0;} // week 0 is current week (this monday)

function renderGrid(){
 var dates=weekDates();
 var box=h("div",{class:"gridwrap",style:"border:1px solid "+C.rule+";border-radius:12px;background:"+C.card+";"});
 var tbl=h("table",{style:"width:100%;font-size:12px;"});
 // header
 var thr=h("tr",{});
 thr.appendChild(h("th",{style:"position:sticky;left:0;background:"+C.ink+";color:#fff;text-align:left;padding:9px 10px;font-size:11px;min-width:120px;z-index:2;"},["Category"]));
 dates.forEach(function(d,i){
   thr.appendChild(h("th",{style:"background:"+C.ink+";color:#fff;padding:6px 8px;font-size:10.5px;min-width:64px;text-align:center;"},[
     h("div",{},["W"+(i+1)]),h("div",{style:"font-weight:400;color:#C9C0B0;font-size:9.5px;"},[wlabel(d)])]));
 });
 tbl.appendChild(thr);

 function section(kind,label,color){
   var hr=h("tr",{});
   hr.appendChild(h("td",{style:"position:sticky;left:0;background:"+C.paper+";color:"+color+";font-weight:700;font-size:10.5px;letter-spacing:.04em;padding:6px 10px;text-transform:uppercase;z-index:1;",colspan:String(NWEEKS+1)},[label]));
   tbl.appendChild(hr);
   cats.filter(function(c){return c.kind===kind;}).forEach(function(c){
     var tr=h("tr",{});
     var nameTd=h("td",{style:"position:sticky;left:0;background:"+C.card+";padding:7px 10px;font-weight:600;border-top:1px solid "+C.rule+";min-width:120px;z-index:1;"},[
       h("span",{},[c.name]),
       h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:10px;margin-left:6px;text-decoration:underline;",
         onclick:function(){renameCategory(c);}},["edit"])
     ]);
     tr.appendChild(nameTd);
     dates.forEach(function(d,wi){
       var e=getCell(c.id,wi);
       var col=e?methodColors(e.method):{bg:"#fff",fg:C.ink};
       var td=h("td",{style:"border-top:1px solid "+C.rule+";border-left:1px solid "+C.rule+";padding:0;text-align:center;",
         onclick:function(){openCell(c,wi);}},[
         h("div",{style:"min-height:34px;display:flex;align-items:center;justify-content:center;background:"+col.bg+";color:"+col.fg+";font-weight:700;font-size:11.5px;cursor:pointer;padding:4px;"},
           [e?money0(e.amt):""])
       ]);
       tr.appendChild(td);
     });
     tbl.appendChild(tr);
   });
 }
 section("income","Income",C.green);
 section("expense","Expenses",C.red);

 // totals rows
 function totalRow(label,fn,color,bold){
   var tr=h("tr",{});
   tr.appendChild(h("td",{style:"position:sticky;left:0;background:"+C.paper+";padding:7px 10px;font-weight:"+(bold?"700":"600")+";font-size:11px;color:"+color+";border-top:2px solid "+C.rule+";z-index:1;"},[label]));
   for(var wi=0;wi<NWEEKS;wi++){
     var v=fn(wi);
     tr.appendChild(h("td",{style:"text-align:center;padding:7px 4px;font-weight:700;font-size:11px;color:"+color+";border-top:2px solid "+C.rule+";"},[v?money0(v):"–"]));
   }
   tbl.appendChild(tr);
 }
 totalRow("Income",weekIncome,C.green,true);
 totalRow("Cash out",weekCashOut,C.cash,false);
 totalRow("Card out",weekCardOut,C.card_,false);
 totalRow("Afterpay out",weekAfterOut,C.after,false);
 totalRow("Cash balance",runningCash,C.ink,true);

 box.appendChild(tbl);
 return box;
}

function openCell(cat,wi){
 var e=getCell(cat.id,wi);
 state.editCell={catId:cat.id,catName:cat.name,kind:cat.kind,wi:wi,amt:e?String(e.amt):"",method:e?e.method:(cat.kind==="income"?"cash":"cash")};
 render();
}
function closeCell(){state.editCell=null;render();}
function renderEditor(){
 var ec=state.editCell;
 var amtInp=h("input",{inputmode:"decimal",value:ec.amt,placeholder:"0.00",
   style:"width:100%;border:1px solid "+C.ink+";background:#fff;border-radius:8px;padding:12px 12px 12px 26px;font-weight:700;font-size:18px;color:"+C.ink+";"});
 amtInp.addEventListener("input",function(e){ec.amt=e.target.value;});
 function methodBtn(mkey,label,color,bg){
   var on=ec.method===mkey;
   return h("button",{style:"flex:1;border:2px solid "+color+";background:"+(on?bg:"#fff")+";color:"+color+";border-radius:8px;padding:11px 0;font-size:13px;font-weight:700;",
     onclick:function(){ec.method=mkey;render();}},[(on?"✓ ":"")+label]);
 }
 var methodRow = ec.kind==="income"
   ? h("div",{style:"font-size:12px;color:"+C.faint+";"},["Income is added to your cash balance."])
   : h("div",{style:"display:flex;gap:7px;"},[
       methodBtn("cash","Cash",C.cash,C.cashBg),
       methodBtn("card","Credit card",C.card_,C.cardBg),
       methodBtn("after","Afterpay",C.after,C.afterBg)
     ]);
 return h("div",{style:"background:"+C.card+";border:1.5px solid "+C.ink+";border-radius:14px;padding:16px;margin-bottom:14px;"},[
   h("div",{style:"font-size:14px;font-weight:700;margin-bottom:10px;"},[ec.catName+" · W"+(ec.wi+1)]),
   h("div",{style:"position:relative;margin-bottom:11px;"},[
     h("span",{style:"position:absolute;left:11px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:17px;"},["$"]),amtInp]),
   h("div",{style:"font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin-bottom:6px;"},[ec.kind==="income"?"":"Paid by (colour)"]),
   methodRow,
   h("div",{style:"display:flex;gap:8px;margin-top:13px;"},[
     h("button",{style:"flex:1;border:none;background:"+C.ink+";color:#fff;border-radius:8px;padding:12px;font-size:14px;font-weight:700;",
       onclick:function(){saveCell();}},["Save"]),
     getCell(ec.catId,ec.wi)?h("button",{style:"border:1px solid "+C.red+";background:#fff;color:"+C.red+";border-radius:8px;padding:12px 16px;font-size:14px;font-weight:600;",
       onclick:function(){clearCell();}},["Clear"]):null,
     h("button",{style:"border:1px solid "+C.rule+";background:"+C.paper+";color:"+C.ink+";border-radius:8px;padding:12px 16px;font-size:14px;font-weight:600;",
       onclick:closeCell},["Cancel"])
   ])
 ]);
}
function saveCell(){var ec=state.editCell;var v=parseFloat(ec.amt);
 if(isNaN(v)||v<=0){clearCell();return;}
 cells[cellKey(ec.catId,ec.wi)]={amt:+v.toFixed(2),method:ec.method};saveCells();state.editCell=null;render();}
function clearCell(){var ec=state.editCell;delete cells[cellKey(ec.catId,ec.wi)];saveCells();state.editCell=null;render();}

function addCategory(){
 var name=prompt("New category name:","");if(!name)return;
 var isInc=confirm("Is this INCOME?\n\nOK = Income\nCancel = Expense");
 cats.push({id:uid(),name:name.trim(),kind:isInc?"income":"expense"});saveCats();render();
}
function renameCategory(c){
 var name=prompt("Rename:",c.name);if(name===null)return;
 if(name.trim()===""){if(confirm("Delete "+c.name+"? (its logged amounts stay in storage)")){cats=cats.filter(function(x){return x.id!==c.id;});saveCats();render();}return;}
 c.name=name.trim();saveCats();render();
}
function editSettings(){
 var o=prompt("Opening cash balance ($):",String(settings.opening||0));if(o!==null)settings.opening=parseFloat(o)||0;
 var cc=prompt("Starting credit card balance ($):",String(settings.ccStart||0));if(cc!==null)settings.ccStart=parseFloat(cc)||0;
 var ap=prompt("Starting Afterpay balance ($):",String(settings.apStart||0));if(ap!==null)settings.apStart=parseFloat(ap)||0;
 saveSettings();render();
}

render();
cloudLoad(function(){refresh();render();});
</script>
</body>
</html>
