function curYear(){return settings.year;}
function weeksInYear(y){return settings.weeks[y]||26;}

function monthlyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt*52/12:freq==="Fortnightly"?amt*26/12:freq==="Monthly"?amt:freq==="Quarterly"?amt/3:freq==="Annually"?amt/12:amt;}
function weeklyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt:freq==="Fortnightly"?amt/2:freq==="Monthly"?amt*12/52:freq==="Quarterly"?amt*4/52:freq==="Annually"?amt/52:amt;}
function nextDue(day){if(!day||day<1)return null;var now=new Date();now.setHours(0,0,0,0);for(var a=0;a<70;a++){var d=new Date(now);d.setDate(d.getDate()+a);if(d.getDate()===day)return d;}return null;}
function daysUntil(day){var d=nextDue(day);if(!d)return null;return Math.round((d-new Date().setHours(0,0,0,0))/86400000);}

/* cells keyed by year|catId|wi */
function cellKey(y,catId,wi){return y+"|"+catId+"|"+wi;}
function getCell(catId,wi){return cells[cellKey(curYear(),catId,wi)]||null;}
function setCell(catId,wi,obj){var k=cellKey(curYear(),catId,wi);if(obj==null)delete cells[k];else cells[k]=obj;saveCells();}

function yWeekIncome(y,wi){var s=0;cats.forEach(function(c){if(c.kind==="income"){var e=cells[cellKey(y,c.id,wi)];if(e)s+=e.amt;}});return s;}
function yWeekOut(y,wi,method){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=cells[cellKey(y,c.id,wi)];if(e&&e.method===method)s+=e.amt;}});return s;}
function weekIncome(wi){return yWeekIncome(curYear(),wi);}
function weekCashOut(wi){return yWeekOut(curYear(),wi,"cash");}
function weekCardOut(wi){return yWeekOut(curYear(),wi,"card");}
function weekAfterOut(wi){return yWeekOut(curYear(),wi,"after");}
function weekPotOut(wi){return yWeekOut(curYear(),wi,"pot");}

/* running cash across ALL years up to current year+week (chronological) */
function allYears(){return Object.keys(settings.weeks).map(Number).sort(function(a,b){return a-b;});}
function totalReserved(){return pots.reduce(function(s,p){return s+(p.reserved||0);},0);}
/* free cash = opening + all income - all cash spends - all reservations(net) ; but reservations move free->pot,
   and pot spends reduce pot. So: freeCash = opening + sum(income) - sum(cashOut) - sum(reservedNet)
   where reservedNet = current total reserved in pots. Pot spends already reduced pot, not cash. */
function sumIncomeAll(){var s=0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekIncome(y,wi);});return s;}
function sumCashOutAll(){var s=0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekOut(y,wi,"cash");});return s;}
function freeCash(){return (settings.opening||0)+sumIncomeAll()-sumCashOutAll()-totalReserved();}
function totalCash(){return freeCash()+totalReserved();}
/* running cash balance per week within current year (free cash trajectory) */
function runningCashWeek(wi){
 var bal=settings.opening||0;
 // include prior years fully
 allYears().forEach(function(y){if(y<curYear()){for(var w=0;w<weeksInYear(y);w++)bal+=yWeekIncome(y,w)-yWeekOut(y,w,"cash");}});
 for(var i=0;i<=wi;i++)bal+=weekIncome(i)-weekCashOut(i);
 bal-=totalReserved(); // reservations set aside
 return bal;
}
function ccBalance(){var s=settings.ccStart||0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekOut(y,wi,"card");});return s;}
function apBalance(){var s=settings.apStart||0;allYears().forEach(function(y){for(var wi=0;wi<weeksInYear(y);wi++)s+=yWeekOut(y,wi,"after");});return s;}

function h(tag,attrs,kids){var e=document.createElement(tag);

   else if(k==="html")e.innerHTML=attrs[k];else if(k==="class")e.className=attrs[k];else if(k==="value")e.value=attrs[k];else e.setAttribute(k,attrs[k]);}
 (kids||[]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
 return e;}

function applyTag(method,potId){
 var pc=state.pendingCell;
 if(method==="pot"){
   var p=pots.filter(function(x){return x.id===potId;})[0];
   if(p){ if((p.reserved||0)<pc.amt){ if(!confirm(p.name+" only has "+money(p.reserved||0)+" reserved. Pay anyway? (pot will go negative)"))return; } p.reserved=(p.reserved||0)-pc.amt; savePots(); }
   setCell(pc.catId,pc.wi,{amt:pc.amt,method:"pot",potId:potId});
 } else {
   setCell(pc.catId,pc.wi,{amt:pc.amt,method:method});
 }
