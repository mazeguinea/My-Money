<script>
var C={paper:"#F6F2E9",ink:"#1B1916",faint:"#8B847A",rule:"#DCD4C6",card:"#FFFFFF",
red:"#B23A2E",redSoft:"#FAECEA",green:"#2E7D5B",greenSoft:"#E8F2EC",amber:"#B8860B",amberSoft:"#FBF2DC",gold:"#A9802B",blue:"#2C5F8A"};

function lget(k){try{var v=localStorage.getItem(k);return v===null?null:v;}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,v);}catch(e){}}
var _cache={};
function loadJSON(k,def){if(k in _cache){try{return JSON.parse(_cache[k]);}catch(e){}}
 var v=lget(k);if(v===null)return def;try{return JSON.parse(v);}catch(e){return def;}}
function saveJSON(k,o){var s=JSON.stringify(o);_cache[k]=s;lset(k,s);
 if(CLOUD){sb.from("kv").upsert({k:k,v:s}).then(function(){},function(){});}}
function cloudLoad(cb){if(!CLOUD){cb();return;}
 sb.from("kv").select("k,v").then(function(res){
   if(res&&res.data){res.data.forEach(function(r){_cache[r.k]=r.v;lset(r.k,r.v);});}cb();
 },function(){cb();});}
function money(n){return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function money0(n){return (n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function uid(){return "x"+Date.now()+Math.floor(Math.random()*999);}

/* ============================================================
   MODEL
   expTpl: [{id,name,what,monthly}]   monthly = suggested top-up
   debtTpl:[{id,name,total,note}]
   months["2026-6"] = {
     in:{expId:[amts]},        money added to a pot that month
     out:{expId:[amts]},       money spent from a pot that month
     payments:{debtId:[amts]}  debt payments that month
   }
   A pot's CURRENT balance = sum(all in, all months) - sum(all out, all months).
   "Topped up this month" = sum(in for this month) vs monthly target.
   ============================================================ */
var DEFAULT_EXP_TPL=[
 {id:"e1",name:"Eating out",monthly:200,what:"meals & takeaway"},
 {id:"e2",name:"Groceries (my share)",monthly:100,what:"food I cover"},
 {id:"e3",name:"Body treats / massage",monthly:99,what:"deep tissue massage"},
 {id:"e4",name:"Clothing",monthly:25,what:"clothes allowance"},
 {id:"e5",name:"Entertainment",monthly:25,what:"fun / outings"},
 {id:"e6",name:"Travel",monthly:25,what:"travel allowance"},
 {id:"e7",name:"Medicines",monthly:25,what:"vitamins & supplements"},
 {id:"e8",name:"Doctor / GP",monthly:25,what:"GP visits set-aside"},
 {id:"e9",name:"Dental",monthly:25,what:"dental set-aside"},
 {id:"e10",name:"Skincare",monthly:25,what:"skin care"},
 {id:"e11",name:"Gifts",monthly:25,what:"gifts set-aside"}
];
var DEFAULT_DEBT_TPL=[
 {id:"d1",name:"Credit Card",total:4235.21,note:"highest priority — interest"},
 {id:"d2",name:"Afterpay",total:820.33,note:"fees if late"},
 {id:"d3",name:"Loan",total:18700,note:"no interest (family)"},
 {id:"d4",name:"Snooky",total:16800,note:"no interest (family)"}
];

var expTpl,debtTpl,months;
function normEntries(){
 // convert bare numbers -> {id,amt}; idempotent
 var changed=false;
 Object.keys(months).forEach(function(k){
   var m=months[k];["in","out","payments"].forEach(function(bk){
     var b=m[bk];if(!b)return;
     Object.keys(b).forEach(function(id){
       b[id]=(b[id]||[]).map(function(x){
         if(typeof x==="number"){changed=true;return {id:uid(),amt:+x};}
         return x;
       });
     });
   });
 });
 if(changed)saveJSON("mm3_months",months);
}
function refreshFromStore(){
 expTpl=loadJSON("mm3_exp_tpl",DEFAULT_EXP_TPL);
 debtTpl=loadJSON("mm3_debt_tpl",DEFAULT_DEBT_TPL);
 months=loadJSON("mm3_months",{});
 normEntries();
}
refreshFromStore();
function saveTpl(){saveJSON("mm3_exp_tpl",expTpl);saveJSON("mm3_debt_tpl",debtTpl);}
function saveMonths(){saveJSON("mm3_months",months);}

function nowKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1);}
function keyToDate(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,1);}
function labelOf(k){return keyToDate(k).toLocaleDateString(undefined,{month:"long",year:"numeric"});}
function shortOf(k){return keyToDate(k).toLocaleDateString(undefined,{month:"short",year:"2-digit"});}
function ensureMonth(k){if(!months[k]){months[k]={in:{},out:{},payments:{}};saveMonths();}
 var m=months[k];if(!m.in)m.in={};if(!m.out)m.out={};if(!m.payments)m.payments={};return m;}

var state={tab:"month",viewKey:nowKey()};
ensureMonth(nowKey());

function allMonthKeys(){var ks={};ks[nowKey()]=1;Object.keys(months).forEach(function(k){ks[k]=1;});
 return Object.keys(ks).sort(function(a,b){return keyToDate(a)-keyToDate(b);});}

function sumArr(a){return (a||[]).reduce(function(s,x){return s+(typeof x==="number"?x:(x&&x.amt||0));},0);}
/* pot balance across ALL months up to & including uptoKey */
function potBalance(expId,uptoKey){var lim=keyToDate(uptoKey);var bal=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim){
   bal+=sumArr(months[k].in&&months[k].in[expId]); bal-=sumArr(months[k].out&&months[k].out[expId]);}});
 return +bal.toFixed(2);}
function inThisMonth(expId,k){return +sumArr((months[k]&&months[k].in&&months[k].in[expId])).toFixed(2);}
function outThisMonth(expId,k){return +sumArr((months[k]&&months[k].out&&months[k].out[expId])).toFixed(2);}
function debtPaidThrough(id,uptoKey){var lim=keyToDate(uptoKey);var s=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim)s+=sumArr(months[k].payments&&months[k].payments[id]);});
 return +s.toFixed(2);}
function debtPaidIn(id,k){return +sumArr((months[k]&&months[k].payments&&months[k].payments[id])).toFixed(2);}

function h(tag,attrs,kids){var e=document.createElement(tag);
 for(var k in attrs){if(k==="style")e.setAttribute("style",attrs[k]);
   else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
   else if(k==="html")e.innerHTML=attrs[k];else if(k==="class")e.className=attrs[k];else e.setAttribute(k,attrs[k]);}
 (kids||[]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
 return e;}

function render(){
 var root=document.getElementById("app");root.innerHTML="";
 var wrap=h("div",{style:"max-width:540px;margin:0 auto;padding:22px 14px 44px;"});
 wrap.appendChild(h("div",{style:"margin-bottom:14px;"},[
   h("div",{style:"font-size:11px;letter-spacing:.2em;color:"+C.gold+";font-weight:700;"},["MY MONEY"]),
   h("h1",{style:"font-family:Georgia,serif;font-size:30px;line-height:1.05;margin-top:6px;font-weight:700;"},
     [state.tab==="month"?"Expense pots":state.tab==="debts"?"Debt tracker":"Month overview"])
 ]));
 var tabs=h("div",{style:"display:flex;gap:4px;background:"+C.rule+";padding:4px;border-radius:10px;margin-bottom:16px;"});
 [["month","Expenses"],["debts","Debts"],["overview","History"]].forEach(function(t){
   var on=state.tab===t[0];
   tabs.appendChild(h("button",{style:"flex:1;border:none;background:"+(on?C.card:"transparent")+";padding:10px 0;border-radius:7px;font-size:13.5px;font-weight:600;color:"+(on?C.ink:C.faint)+";"+(on?"box-shadow:0 1px 2px rgba(0,0,0,.06);":""),
     onclick:function(){state.tab=t[0];render();}},[t[1]]));
 });
 wrap.appendChild(tabs);
 wrap.appendChild(h("div",{style:"display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:99px;margin-bottom:14px;"+
   (CLOUD?"background:"+C.greenSoft+";color:"+C.green+";border:1px solid "+C.green:"background:"+C.amberSoft+";color:"+C.amber+";border:1px solid "+C.amber)},
   [CLOUD?"\u2601 SYNCED TO CLOUD":"\u26a0 THIS DEVICE ONLY"]));
 if(state.tab==="month")renderMonth(wrap);
 else if(state.tab==="debts")renderDebts(wrap);
 else renderOverview(wrap);
 wrap.appendChild(h("div",{style:"font-size:11px;color:"+C.faint+";text-align:center;line-height:1.5;margin-top:14px;"},
   ["Saved on this device · pots carry over · each month kept"]));
 root.appendChild(wrap);
}

function monthPicker(wrap){
 var keys=allMonthKeys();var idx=keys.indexOf(state.viewKey);
 if(idx<0){state.viewKey=nowKey();idx=keys.indexOf(state.viewKey);}
 var isLatest=idx>=keys.length-1,isEarliest=idx<=0;
 var nav=h("div",{style:"display:flex;align-items:center;gap:12px;border-top:1px solid "+C.rule+";border-bottom:1px solid "+C.rule+";padding:8px 0;margin-bottom:14px;"});
 nav.appendChild(h("button",{style:"border:none;background:none;font-size:22px;color:"+C.ink+";width:28px;height:28px;opacity:"+(isEarliest?.3:1)+";",
   onclick:function(){if(isEarliest)return;state.viewKey=keys[idx-1];render();}},["‹"]));
 nav.appendChild(h("span",{style:"flex:1;text-align:center;font-size:15px;font-weight:600;"},[labelOf(state.viewKey)+(state.viewKey===nowKey()?"  ·  now":"")]));
 nav.appendChild(h("button",{style:"border:none;background:none;font-size:22px;color:"+C.ink+";width:28px;height:28px;opacity:"+(isLatest?.3:1)+";",
   onclick:function(){if(isLatest)return;state.viewKey=keys[idx+1];render();}},["›"]));
 wrap.appendChild(nav);
}

/* ---------- EXPENSE POTS ---------- */
function renderMonth(wrap){
 monthPicker(wrap);
 var k=state.viewKey;ensureMonth(k);
 var totalBal=expTpl.reduce(function(s,e){return s+potBalance(e.id,k);},0);
 var totalIn=expTpl.reduce(function(s,e){return s+inThisMonth(e.id,k);},0);
 var totalOut=expTpl.reduce(function(s,e){return s+outThisMonth(e.id,k);},0);

 wrap.appendChild(h("div",{style:"background:"+C.card+";border:1.5px solid "+C.rule+";border-radius:14px;padding:16px 18px;margin-bottom:14px;"},[
   h("div",{style:"font-size:12px;color:"+C.faint+";font-weight:600;"},["Total in all pots (through "+shortOf(k)+")"]),
   h("div",{style:"font-family:Georgia,serif;font-size:30px;font-weight:700;margin-top:2px;color:"+(totalBal<0?C.red:C.ink)+";"},[money(totalBal)]),
   h("div",{style:"display:flex;gap:18px;margin-top:10px;font-size:12.5px;"},[
     h("span",{style:"color:"+C.green+";font-weight:600;"},["+ "+money0(totalIn)+" in"]),
     h("span",{style:"color:"+C.red+";font-weight:600;"},["− "+money0(totalOut)+" spent"]),
     h("span",{style:"color:"+C.faint+";"},["this month"])
   ])
 ]));

 expTpl.forEach(function(e){
   var bal=potBalance(e.id,k);
   var inM=inThisMonth(e.id,k), outM=outThisMonth(e.id,k);
   var toppedPct=e.monthly>0?Math.min(100,(inM/e.monthly)*100):0;
   var topped=e.monthly>0&&inM>=e.monthly;
   var row=h("div",{style:"background:"+C.card+";border:1px solid "+C.rule+";border-radius:12px;padding:13px 15px;margin-bottom:9px;"});
   row.appendChild(h("div",{style:"display:flex;justify-content:space-between;align-items:baseline;"},[
     h("div",{style:"min-width:0;"},[h("span",{style:"font-size:15px;font-weight:700;"},[e.name]),
       topped?h("span",{style:"font-size:9px;font-weight:800;letter-spacing:.06em;color:"+C.green+";border:1px solid "+C.green+";border-radius:4px;padding:1px 5px;margin-left:7px;"},["TOPPED UP ✓"]):null]),
     h("span",{style:"font-size:15px;font-weight:700;color:"+(bal<0?C.red:C.ink)+";"},[money(bal)])]));
   row.appendChild(h("div",{style:"font-size:11.5px;color:"+C.faint+";margin:2px 0 4px;"},[(e.what||"")+" · in pot"]));
   // monthly top-up progress
   row.appendChild(h("div",{style:"display:flex;justify-content:space-between;font-size:11px;color:"+C.faint+";margin-bottom:4px;"},[
     h("span",{},["Added "+money0(inM)+" / "+money0(e.monthly)+" this month"]),
     h("span",{},[outM>0?("spent "+money0(outM)):""])]));
   row.appendChild(h("div",{style:"height:6px;background:"+C.rule+";border-radius:99px;overflow:hidden;"},[
     h("div",{class:"bar",style:"height:100%;border-radius:99px;width:"+toppedPct+"%;background:"+(topped?C.green:C.ink)+";"},[])]));

   // two actions: add money in, record spend out
   var inInp=h("input",{inputmode:"decimal",placeholder:"add",
     style:"width:100%;border:1px solid "+C.rule+";background:"+C.paper+";border-radius:8px;padding:9px 8px 9px 20px;color:"+C.ink+";font-weight:700;font-size:14px;"});
   function addIn(){var v=parseFloat(inInp.value);if(!v||v<=0)return;var m=ensureMonth(k);if(!m.in[e.id])m.in[e.id]=[];m.in[e.id].push({id:uid(),amt:+v.toFixed(2)});saveMonths();render();}
   inInp.addEventListener("keydown",function(ev){if(ev.key==="Enter")addIn();});
   var outInp=h("input",{inputmode:"decimal",placeholder:"spend",
     style:"width:100%;border:1px solid "+C.rule+";background:"+C.paper+";border-radius:8px;padding:9px 8px 9px 20px;color:"+C.ink+";font-weight:700;font-size:14px;"});
   function addOut(){var v=parseFloat(outInp.value);if(!v||v<=0)return;var m=ensureMonth(k);if(!m.out[e.id])m.out[e.id]=[];m.out[e.id].push({id:uid(),amt:+v.toFixed(2)});saveMonths();render();}
   outInp.addEventListener("keydown",function(ev){if(ev.key==="Enter")addOut();});

   row.appendChild(h("div",{style:"display:flex;gap:7px;margin-top:11px;"},[
     h("div",{style:"position:relative;flex:1;"},[h("span",{style:"position:absolute;left:9px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:13px;"},["$"]),inInp]),
     h("button",{style:"border:none;background:"+C.green+";color:#fff;border-radius:8px;padding:0 13px;font-size:12.5px;font-weight:700;",onclick:addIn},["+ In"]),
     h("div",{style:"position:relative;flex:1;"},[h("span",{style:"position:absolute;left:9px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:13px;"},["$"]),outInp]),
     h("button",{style:"border:none;background:"+C.red+";color:#fff;border-radius:8px;padding:0 13px;font-size:12.5px;font-weight:700;",onclick:addOut},["− Spend"])
   ]));
   row.appendChild(h("div",{style:"display:flex;gap:14px;margin-top:9px;"},[
     h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;",onclick:function(){editExp(e);}},["edit"]),
     h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;",
       onclick:function(){if(confirm("Remove "+e.name+" going forward?")){expTpl=expTpl.filter(function(x){return x.id!==e.id;});saveTpl();render();}}},["remove"])
   ]));
   wrap.appendChild(row);
 });
 wrap.appendChild(h("button",{style:"width:100%;border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:12px;padding:14px;font-size:14px;font-weight:600;margin-top:4px;",
   onclick:function(){editExp(null);}},["+ Add an expense pot"]));
}

function editExp(e){
 var isNew=!e;
 var name=prompt(isNew?"Pot name:":"Name:",isNew?"":e.name);if(name===null)return;
 var what=prompt("What's it for? (short note)",isNew?"":(e.what||""));if(what===null)return;
 var monthly=prompt("Suggested monthly top-up ($):",isNew?"":String(e.monthly));if(monthly===null)return;
 monthly=parseFloat(monthly)||0;
 if(isNew){expTpl.push({id:uid(),name:name,what:what,monthly:monthly});}else{e.name=name;e.what=what;e.monthly=monthly;}
 saveTpl();render();
}

/* ---------- DEBTS (one-way paydown) ---------- */
function renderDebts(wrap){
 monthPicker(wrap);var k=state.viewKey;ensureMonth(k);
 var totalOwed=debtTpl.reduce(function(s,d){return s+Math.max(0,d.total-debtPaidThrough(d.id,k));},0);
 wrap.appendChild(h("div",{style:"background:"+C.card+";border:1.5px solid "+C.rule+";border-radius:14px;padding:16px 18px;margin-bottom:14px;"},[
   h("div",{style:"font-size:12px;color:"+C.faint+";font-weight:600;"},["Still owed (through "+shortOf(k)+")"]),
   h("div",{style:"font-family:Georgia,serif;font-size:28px;font-weight:700;margin-top:2px;color:"+(totalOwed<=0?C.green:C.ink)+";"},[money(totalOwed)])]));
 debtTpl.forEach(function(d){
   var paidThrough=debtPaidThrough(d.id,k),paidIn=debtPaidIn(d.id,k);
   var rem=Math.max(0,d.total-paidThrough),pct=d.total>0?Math.min(100,(paidThrough/d.total)*100):0,done=rem<=0;
   var sec=h("div",{style:"background:"+C.card+";border:1px solid "+(done?C.green:C.rule)+";border-radius:12px;padding:14px 15px;margin-bottom:11px;"});
   sec.appendChild(h("div",{style:"display:flex;justify-content:space-between;align-items:baseline;"},[
     h("span",{style:"font-size:16px;font-weight:700;"},[d.name]),
     h("span",{style:"font-size:16px;font-weight:700;color:"+(done?C.green:C.ink)+";"},[done?"CLEARED ✓":money(rem)])]));
   if(d.note)sec.appendChild(h("div",{style:"font-size:11.5px;color:"+C.faint+";margin:2px 0 4px;"},[d.note]));
   sec.appendChild(h("div",{style:"font-size:11.5px;color:"+C.faint+";margin-bottom:8px;"},["Paid this month: "+money(paidIn)]));
   sec.appendChild(h("div",{style:"height:8px;background:"+C.rule+";border-radius:99px;overflow:hidden;"},[
     h("div",{class:"bar",style:"height:100%;border-radius:99px;width:"+pct+"%;background:"+(done?C.green:C.ink)+";"},[])]));
   sec.appendChild(h("div",{style:"display:flex;justify-content:space-between;font-size:12.5px;color:"+C.faint+";margin-top:9px;"},[
     h("span",{},["Paid "+money(paidThrough)+" of "+money(d.total)]),h("span",{},[Math.round(pct)+"%"])]));
   if(!done){
     var pin=h("input",{inputmode:"decimal",placeholder:"payment in "+shortOf(k),
       style:"width:100%;border:1px solid "+C.rule+";background:"+C.paper+";border-radius:8px;padding:10px 12px 10px 24px;color:"+C.ink+";font-weight:700;font-size:15px;"});
     function payIt(){var v=parseFloat(pin.value);if(!v||v<=0)return;var m=ensureMonth(k);if(!m.payments[d.id])m.payments[d.id]=[];m.payments[d.id].push({id:uid(),amt:+v.toFixed(2)});saveMonths();render();}
     pin.addEventListener("keydown",function(ev){if(ev.key==="Enter")payIt();});
     sec.appendChild(h("div",{style:"display:flex;gap:8px;margin-top:11px;"},[
       h("div",{style:"position:relative;flex:1;"},[h("span",{style:"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:16px;"},["$"]),pin]),
       h("button",{style:"border:none;background:"+C.ink+";color:"+C.paper+";border-radius:8px;padding:0 18px;font-size:14px;font-weight:600;",onclick:payIt},["Log payment"])]));
   }
   sec.appendChild(h("div",{style:"display:flex;gap:14px;margin-top:10px;"},[
     h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;",onclick:function(){editDebt(d);}},["edit"]),
     h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;",
       onclick:function(){if(confirm("Remove "+d.name+"?")){debtTpl=debtTpl.filter(function(x){return x.id!==d.id;});saveTpl();render();}}},["remove"])
   ]));
   wrap.appendChild(sec);
 });
 wrap.appendChild(h("button",{style:"width:100%;border:1.5px dashed "+C.rule+";background:none;color:"+C.faint+";border-radius:12px;padding:14px;font-size:14px;font-weight:600;margin-top:4px;",
   onclick:function(){editDebt(null);}},["+ Add a debt / loan"]));
}
function editDebt(d){
 var isNew=!d;
 var name=prompt(isNew?"Debt / loan name:":"Name:",isNew?"":d.name);if(name===null)return;
 var total=prompt("Total amount owed ($):",isNew?"":String(d.total));if(total===null)return;total=parseFloat(total)||0;
 var note=prompt("Note (optional):",isNew?"":(d.note||""));if(note===null)note="";
 if(isNew){debtTpl.push({id:uid(),name:name,total:total,note:note});}else{d.name=name;d.total=total;d.note=note;}
 saveTpl();render();
}

/* ---------- HISTORY ---------- */
function entryName(bk,id){
 if(bk==="payments"){var d=debtTpl.filter(function(x){return x.id===id;})[0];return d?d.name:"(removed debt)";}
 var e=expTpl.filter(function(x){return x.id===id;})[0];return e?e.name:"(removed)";
}
function editEntry(k,bk,id,entryId){
 var m=months[k];var arr=m[bk][id];var idx=-1;
 for(var i=0;i<arr.length;i++){if(arr[i].id===entryId){idx=i;break;}}
 if(idx<0)return;
 var v=prompt("Edit amount ($):",String(arr[idx].amt));if(v===null)return;
 v=parseFloat(v);if(isNaN(v)||v<=0){alert("Enter a number greater than 0, or use Delete.");return;}
 arr[idx].amt=+v.toFixed(2);saveMonths();render();
}
function delEntry(k,bk,id,entryId){
 if(!confirm("Delete this entry?"))return;
 var m=months[k];m[bk][id]=m[bk][id].filter(function(x){return x.id!==entryId;});saveMonths();render();
}
function renderOverview(wrap){
 var keys=allMonthKeys().slice().reverse();
 wrap.appendChild(h("div",{style:"background:"+C.card+";border:1px solid "+C.rule+";border-radius:12px;padding:13px 15px;font-size:12.5px;line-height:1.5;color:"+C.ink+";margin-bottom:14px;"},
   ["Each month: money added to pots, money spent, debt paid. Tap a month to see every entry and fix mistakes."]));
 if(!state.openMonth)state.openMonth=null;
 keys.forEach(function(k){
   var m=months[k]||{in:{},out:{},payments:{}};
   var inT=0,outT=0,debtT=0;
   expTpl.forEach(function(e){inT+=sumArr(m.in&&m.in[e.id]);outT+=sumArr(m.out&&m.out[e.id]);});
   Object.keys(m.payments||{}).forEach(function(id){debtT+=sumArr(m.payments[id]);});
   var open=state.openMonth===k;
   var head=h("div",{style:"background:"+C.card+";border:1px solid "+(open?C.ink:C.rule)+";border-radius:12px;padding:14px 15px;margin-bottom:"+(open?"0":"9px")+";"+(open?"border-bottom-left-radius:0;border-bottom-right-radius:0;":""),
     onclick:function(){state.openMonth=open?null:k;render();}},[
     h("div",{style:"display:flex;justify-content:space-between;align-items:baseline;"},[
       h("span",{style:"font-size:15px;font-weight:700;"},[labelOf(k)+(k===nowKey()?"  · now":"")]),
       h("span",{style:"font-size:12px;color:"+C.faint+";"},[open?"tap to close ▾":"tap to view ›"])]),
     h("div",{style:"display:flex;gap:16px;margin-top:9px;font-size:12.5px;flex-wrap:wrap;"},[
       h("span",{style:"color:"+C.green+";font-weight:600;"},["+ "+money0(inT)+" into pots"]),
       h("span",{style:"color:"+C.red+";font-weight:600;"},["− "+money0(outT)+" spent"]),
       h("span",{style:"color:"+C.ink+";font-weight:600;"},[money0(debtT)+" to debt"])])
   ]);
   wrap.appendChild(head);
   if(open){
     var panel=h("div",{style:"background:"+C.card+";border:1px solid "+C.ink+";border-top:none;border-radius:0 0 12px 12px;padding:6px 15px 14px;margin-bottom:9px;"});
     var any=false;
     function section(title,bk,color){
       var rows=[];
       Object.keys(m[bk]||{}).forEach(function(id){
         (m[bk][id]||[]).forEach(function(en){
           any=true;
           rows.push(h("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid "+C.rule+";"},[
             h("span",{style:"flex:1;font-size:13px;"},[entryName(bk,id)]),
             h("span",{style:"font-size:13.5px;font-weight:700;color:"+color+";min-width:70px;text-align:right;"},[money(en.amt)]),
             h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",
               onclick:function(){editEntry(k,bk,id,en.id);}},["edit"]),
             h("button",{style:"border:none;background:none;color:"+C.red+";font-size:11.5px;text-decoration:underline;",
               onclick:function(){delEntry(k,bk,id,en.id);}},["delete"])
           ]));
         });
       });
       if(rows.length){
         panel.appendChild(h("div",{style:"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin:10px 0 2px;"},[title]));
         rows.forEach(function(r){panel.appendChild(r);});
       }
     }
     section("Added to pots","in",C.green);
     section("Spent from pots","out",C.red);
     section("Debt payments","payments",C.ink);
     if(!any)panel.appendChild(h("div",{style:"font-size:12.5px;color:"+C.faint+";padding:12px 0;"},["No entries logged this month yet."]));
     wrap.appendChild(panel);
   }
 });
}

render();
cloudLoad(function(){refreshFromStore();ensureMonth(nowKey());render();});
</script>
</body>
