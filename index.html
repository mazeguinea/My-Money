<script>

function lget(k){try{var v=localStorage.getItem(k);return v===null?null:v;}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,v);}catch(e){}}
var _cache={};
function loadJSON(k,def){if(k in _cache){try{return JSON.parse(_cache[k]);}catch(e){}}
 var v=lget(k);if(v===null)return def;try{return JSON.parse(v);}catch(e){return def;}}
function saveJSON(k,o){var s=JSON.stringify(o);_cache[k]=s;lset(k,s);
 if(CLOUD){sb.from("kv").upsert({k:k,v:s}).then(function(){},function(){});}}
function cloudLoad(cb){if(!CLOUD){cb();return;}
 sb.from("kv").select("k,v").then(function(res){
   if(res&&res.data){res.data.forEach(function(r){_cache[r.k]=r.v;lset(r.k,r.v);});}cb();
 },function(){cb();});}
function money(n){return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function money0(n){return (n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function uid(){return "x"+Date.now()+Math.floor(Math.random()*999);}

/* ============================================================
   MODEL
   expTpl: [{id,name,what,monthly}]   monthly = suggested top-up
   debtTpl:[{id,name,total,note}]
   months["2026-6"] = {
     in:{expId:[amts]},        money added to a pot that month
     out:{expId:[amts]},       money spent from a pot that month
     payments:{debtId:[amts]}  debt payments that month
   }
   A pot's CURRENT balance = sum(all in, all months) - sum(all out, all months).
   "Topped up this month" = sum(in for this month) vs monthly target.
   ============================================================ */
var DEFAULT_EXP_TPL=[
 {id:"e1",name:"Eating out",monthly:200,what:"meals & takeaway"},

 {id:"e6",name:"Travel",monthly:25,what:"travel allowance"},
 {id:"e7",name:"Medicines",monthly:25,what:"vitamins & supplements"},
 {id:"e8",name:"Doctor / GP",monthly:25,what:"GP visits set-aside"},
 {id:"e9",name:"Dental",monthly:25,what:"dental set-aside"},
 {id:"e10",name:"Skincare",monthly:25,what:"skin care"},
 {id:"e11",name:"Gifts",monthly:25,what:"gifts set-aside"}
];
var DEFAULT_DEBT_TPL=[
 {id:"d1",name:"Credit Card",total:4235.21,note:"highest priority — interest",isCard:true},
 {id:"d2",name:"Afterpay",total:820.33,note:"fees if late",isCard:true},
 {id:"d3",name:"Loan",total:18700,note:"no interest (family)"},
 {id:"d4",name:"Snooky",total:16800,note:"no interest (family)"},
 {id:"d5",name:"Fujin (car · my half)",total:14524.38,note:"~$558.63/mo, ~26 months left"}
];
// Bills = pots you fund gradually toward a dated due. cycle drives the weekly set-aside.
var DEFAULT_BILL_TPL=[
 {id:"b1",name:"Rent",amount:1868,cycle:"monthly",due:21,note:""},
 {id:"b2",name:"Internet",amount:113,cycle:"monthly",due:22,note:""},
 {id:"b3",name:"Car Space",amount:130,cycle:"monthly",due:5,note:""},
 {id:"b4",name:"Manulife Insurance",amount:353,cycle:"quarterly",due:24,note:"every quarter"},
 {id:"b5",name:"BUPA Insurance",amount:109,cycle:"monthly",due:1,note:""},
 {id:"b6",name:"Sister's condo",amount:600,cycle:"monthly",due:11,note:"until end Dec"},
 {id:"b7",name:"Claude AI",amount:360,cycle:"monthly",due:15,note:""},
 {id:"b8",name:"Costco",amount:130,cycle:"yearly",due:1,note:"once a year"},
 {id:"b9",name:"MS Office",amount:109,cycle:"yearly",due:1,note:"once a year"},
 {id:"b10",name:"Transport (Myki)",amount:1150,cycle:"yearly",due:1,note:"yearly pack"}
];
// Workouts are fortnightly (15th & 30th) at 230 each pay — represent as a fortnightly bill.
DEFAULT_BILL_TPL.push({id:"b11",name:"Workouts",amount:230,cycle:"fortnightly",due:15,due2:30,note:"15th & 30th"});


var expTpl,debtTpl,billTpl,months,archived;
function normEntries(){
 // convert bare numbers -> {id,amt}; idempotent
 var changed=false;
 Object.keys(months).forEach(function(k){
   var m=months[k];["in","out","payments","charges"].forEach(function(bk){
     var b=m[bk];if(!b)return;
     Object.keys(b).forEach(function(id){
       b[id]=(b[id]||[]).map(function(x){
         if(typeof x==="number"){changed=true;return {id:uid(),amt:+x};}
         return x;
       });
     });
   });
 });
 Object.keys(months).forEach(function(k){var m=months[k];if(!m.cash)m.cash=[];if(!m.charges)m.charges={};});
 // auto-flag credit-card-like debts so the card features show up on existing data
 if(typeof debtTpl!=="undefined"&&debtTpl){var ch2=false;debtTpl.forEach(function(d){
   if(d.isCard===undefined){var n=(d.name||"").toLowerCase();
     if(n.indexOf("credit")>=0||n.indexOf("card")>=0||n.indexOf("afterpay")>=0){d.isCard=true;ch2=true;}}});
   if(ch2)saveJSON("mm3_debt_tpl",debtTpl);}
 if(changed)saveJSON("mm3_months",months);
}
function refreshFromStore(){
 expTpl=loadJSON("mm3_exp_tpl",DEFAULT_EXP_TPL);
 debtTpl=loadJSON("mm3_debt_tpl",DEFAULT_DEBT_TPL);
 billTpl=loadJSON("mm3_bill_tpl",DEFAULT_BILL_TPL);
 months=loadJSON("mm3_months",{});
 archived=loadJSON("mm3_archived",{});
 normEntries();
}
refreshFromStore();
function saveTpl(){saveJSON("mm3_exp_tpl",expTpl);saveJSON("mm3_debt_tpl",debtTpl);saveJSON("mm3_bill_tpl",billTpl);}
function saveArchived(){saveJSON("mm3_archived",archived);}
function archiveItem(id,name){if(!archived)archived={};archived[id]={name:name};saveArchived();}
function saveMonths(){saveJSON("mm3_months",months);}

function nowKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1);}
function keyToDate(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,1);}
function labelOf(k){return keyToDate(k).toLocaleDateString(undefined,{month:"long",year:"numeric"});}
function shortOf(k){return keyToDate(k).toLocaleDateString(undefined,{month:"short",year:"2-digit"});}
function ensureMonth(k){if(!months[k]){months[k]={in:{},out:{},payments:{},cash:[],charges:{}};saveMonths();}
 var m=months[k];if(!m.in)m.in={};if(!m.out)m.out={};if(!m.payments)m.payments={};if(!m.cash)m.cash=[];if(!m.charges)m.charges={};return m;}

var state={tab:"dash",viewKey:nowKey(),payFor:null,payAmt:"",editBill:null,editExp:null,editDebt:null};
ensureMonth(nowKey());

function allMonthKeys(){var ks={};ks[nowKey()]=1;Object.keys(months).forEach(function(k){ks[k]=1;});
 return Object.keys(ks).sort(function(a,b){return keyToDate(a)-keyToDate(b);});}

function sumArr(a){return (a||[]).reduce(function(s,x){return s+(typeof x==="number"?x:(x&&x.amt||0));},0);}
/* pot balance across ALL months up to & including uptoKey */
function isCardEntry(en){return en&&typeof en==="object"&&en.paidBy==="card";}
function sumCash(a){return (a||[]).reduce(function(s,x){if(isCardEntry(x))return s;return s+(typeof x==="number"?x:(x&&x.amt||0));},0);}
function potBalance(expId,uptoKey){var lim=keyToDate(uptoKey);var bal=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim){
   bal+=sumCash(months[k].in&&months[k].in[expId]); bal-=sumCash(months[k].out&&months[k].out[expId]);}});
 return +bal.toFixed(2);}
function inThisMonth(expId,k){return +sumArr((months[k]&&months[k].in&&months[k].in[expId])).toFixed(2);}
function outThisMonth(expId,k){return +sumArr((months[k]&&months[k].out&&months[k].out[expId])).toFixed(2);}
function debtPaidThrough(id,uptoKey){var lim=keyToDate(uptoKey);var s=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim)s+=sumArr(months[k].payments&&months[k].payments[id]);});
 return +s.toFixed(2);}
function debtPaidIn(id,k){return +sumArr((months[k]&&months[k].payments&&months[k].payments[id])).toFixed(2);}
function chargeThrough(id,uptoKey){var lim=keyToDate(uptoKey);var s=0;Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim)s+=sumArr(months[k].charges&&months[k].charges[id]);});return +s.toFixed(2);}
function chargeIn(id,k){return +sumArr((months[k]&&months[k].charges&&months[k].charges[id])).toFixed(2);}
function cardDebts(){return debtTpl.filter(function(d){return d.isCard;});}
function addCharge(debtId,amt,k){var m=ensureMonth(k);if(!m.charges[debtId])m.charges[debtId]=[];m.charges[debtId].push({id:uid(),amt:+amt.toFixed(2),date:todayISO()});saveMonths();}
function todayISO(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function addPotOut(potId,amt,k,meta){var m=ensureMonth(k);if(!m.out[potId])m.out[potId]=[];
 var e={id:uid(),amt:+amt.toFixed(2),date:todayISO(),paidBy:(meta&&meta.paidBy)||"cash"};
 if(meta&&meta.debtId)e.debtId=meta.debtId;
 m.out[potId].push(e);saveMonths();}
function openPay(potId,label,avail){state.payFor={potId:potId,label:label,avail:avail};state.payAmt="";render();}
function closePay(){state.payFor=null;state.payAmt="";render();}
function payCash(k){var f=state.payFor;var v=parseFloat(state.payAmt);if(isNaN(v)||v<=0){alert("Enter an amount first.");return;}
 if(v>f.avail+0.001){alert("That pot only has "+money(f.avail)+" set aside.\n\nSet aside more first, or pay a smaller amount by cash.");return;}
 addPotOut(f.potId,v,k);closePay();}
function payCard(k,debtId){var f=state.payFor;var v=parseFloat(state.payAmt);if(isNaN(v)||v<=0){alert("Enter an amount first.");return;}
 var cd=debtTpl.filter(function(d){return d.id===debtId;})[0];if(!cd)return;
 if(!confirm("Spend "+money(v)+" on "+f.label+" using "+cd.name+"?\n\nThis counts as a "+f.label+" spend AND adds "+money(v)+" to your "+cd.name+" balance. The pot's cash is left untouched.")) return;
 addCharge(debtId,v,k);
 // record the category spend too, flagged as card (does NOT reduce pot balance in our cash math? it does via out...)
 // To keep pot CASH untouched we log a spend with paidBy:card and EXCLUDE card-spends from pot balance + cash math.
 addPotOut(f.potId,v,k,{paidBy:"card",debtId:debtId});
 closePay();}
function renderPayPanel(parent,k){
 var f=state.payFor;
 var amtInp=h("input",{inputmode:"decimal",placeholder:"amount to pay",value:state.payAmt||"",
   style:"width:100%;border:1px solid "+C.ink+";background:#fff;border-radius:8px;padding:10px 12px 10px 24px;color:"+C.ink+";font-weight:700;font-size:16px;"});
 amtInp.addEventListener("input",function(e){state.payAmt=e.target.value;});
 var cards=debtTpl.filter(function(d){return d.isCard;});
 var btns=[h("button",{style:"flex:1;min-width:90px;border:none;background:"+C.ink+";color:#fff;border-radius:8px;padding:11px 0;font-size:13px;font-weight:700;",
   onclick:function(){state.payAmt=amtInp.value;payCash(k);}},["Cash"])];
 cards.forEach(function(c){
   btns.push(h("button",{style:"flex:1;min-width:90px;border:1px solid "+C.red+";background:"+C.redSoft+";color:"+C.red+";border-radius:8px;padding:11px 0;font-size:13px;font-weight:700;",
     onclick:function(){state.payAmt=amtInp.value;payCard(k,c.id);}},[c.name]));
 });
 parent.appendChild(h("div",{style:"margin-top:11px;padding:12px;border:1.5px solid "+C.ink+";border-radius:10px;background:"+C.paper+";"},[
   h("div",{style:"font-size:12px;font-weight:700;margin-bottom:8px;"},["Pay "+f.label+" \u2014 choose how:"]),
   h("div",{style:"position:relative;margin-bottom:10px;"},[h("span",{style:"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:"+C.faint+";font-size:16px;"},["$"]),amtInp]),
   h("div",{style:"display:flex;gap:7px;flex-wrap:wrap;"},btns),
   h("button",{style:"margin-top:9px;border:none;background:none;color:"+C.faint+";font-size:12px;text-decoration:underline;",onclick:closePay},["cancel"])
 ]));
}
function cashInThrough(uptoKey){var lim=keyToDate(uptoKey);var s=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim)s+=sumArr(months[k].cash);});return +s.toFixed(2);}
function cashInMonth(k){return +sumArr((months[k]&&months[k].cash)).toFixed(2);}
function allPotIn(uptoKey){var lim=keyToDate(uptoKey);var s=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim){var mi=months[k].in||{};Object.keys(mi).forEach(function(id){s+=sumArr(mi[id]);});}});return +s.toFixed(2);}
function allDebtPaid(uptoKey){var lim=keyToDate(uptoKey);var s=0;
 Object.keys(months).forEach(function(k){if(keyToDate(k)<=lim){var mp=months[k].payments||{};Object.keys(mp).forEach(function(id){s+=sumArr(mp[id]);});}});return +s.toFixed(2);}
function totalPotBalance(uptoKey){var s=0;expTpl.forEach(function(e){s+=potBalance(e.id,uptoKey);});billTpl.forEach(function(b){s+=potBalance(b.id,uptoKey);});return +s.toFixed(2);}
function freeCash(uptoKey){ // cash in - funded into pots - debt paid
 return +(cashInThrough(uptoKey)-allPotIn(uptoKey)-allDebtPaid(uptoKey)).toFixed(2);}
function totalCash(uptoKey){ return +(freeCash(uptoKey)+totalPotBalance(uptoKey)).toFixed(2);}
function billWeekly(b){var a=+b.amount||0;
 if(b.cycle==="weekly")return a;
 if(b.cycle==="fortnightly")return a*26/52;   // 230 each fortnight -> per week
 if(b.cycle==="monthly")return a*12/52;
 if(b.cycle==="quarterly")return a*4/52;
 if(b.cycle==="yearly")return a/52;
 return a;}
function billMonthly(b){var a=+b.amount||0;
 if(b.cycle==="weekly")return a*52/12;
 if(b.cycle==="fortnightly")return a*26/12;
 if(b.cycle==="monthly")return a;
 if(b.cycle==="quarterly")return a/3;
 if(b.cycle==="yearly")return a/12;
 return a;}
// bills reuse the SAME in/out pot mechanics, keyed by bill id (ids are distinct from exp ids)
function billBalance(id,uptoKey){return potBalance(id,uptoKey);} 

function h(tag,attrs,kids){var e=document.createElement(tag);
 for(var k in attrs){if(k==="style")e.setAttribute("style",attrs[k]);
   else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
   else if(k==="html")e.innerHTML=attrs[k];else if(k==="class")e.className=attrs[k];else e.setAttribute(k,attrs[k]);}
 (kids||[]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
 return e;}


function nextOccur(dayOfMonth){ // next date (today or future) matching day-of-month, within ~2 months
 var now=new Date(); now.setHours(0,0,0,0);
 for(var add=0; add<70; add++){var d=new Date(now); d.setDate(d.getDate()+add); if(d.getDate()===dayOfMonth) return d;}
 return null;
}
function upcomingDue(){
 var now=new Date(); now.setHours(0,0,0,0);
 var horizon=new Date(now); horizon.setDate(horizon.getDate()+7);
 var items=[];
 // bills
 billTpl.forEach(function(b){
   var days=[]; if(b.due)days.push(b.due); if(b.due2)days.push(b.due2);
   days.forEach(function(dd){
     var nd=nextOccur(dd); if(nd && nd>=now && nd<=horizon){ items.push({name:b.name, amt:b.amount, date:nd}); }
   });
 });
 // credit card: always 4th, amount = current balance
 var cc=debtTpl.filter(function(d){return (d.name||"").toLowerCase().indexOf("credit")>=0;})[0];
 if(cc){var nd=nextOccur(4); if(nd&&nd>=now&&nd<=horizon){var bal=cc.total+chargeThrough(cc.id,nowKey())-debtPaidThrough(cc.id,nowKey()); if(bal>0)items.push({name:cc.name,amt:bal,date:nd,card:true});}}
 items.sort(function(a,b){return a.date-b.date;});
 return items;
}
function renderDueBanner(wrap){
 var items=upcomingDue(); if(items.length===0)return;
 var now=new Date(); now.setHours(0,0,0,0);
 var rows=items.map(function(it){
   var dd=Math.round((it.date-now)/86400000);
   var when = dd===0?"today" : dd===1?"tomorrow" : "in "+dd+" days";
   return h("div",{style:"display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-top:1px solid rgba(255,255,255,0.15);"},[
     h("span",{style:"font-size:13px;"},[it.name+(it.card?" (card)":"")+" \u00b7 "+when]),
     h("span",{style:"font-size:13.5px;font-weight:700;"},[money0(it.amt)])
   ]);
 });
 wrap.appendChild(h("div",{style:"background:"+C.gold+";color:#fff;border-radius:12px;padding:12px 15px;margin-bottom:14px;"},
   [h("div",{style:"font-size:11px;letter-spacing:.1em;font-weight:800;margin-bottom:2px;"},["\u23f0 DUE IN THE NEXT 7 DAYS"])].concat(rows)
 ));
}
function render(){
 var root=document.getElementById("app");root.innerHTML="";
 var wrap=h("div",{style:"max-width:540px;margin:0 auto;padding:22px 14px 44px;"});
 wrap.appendChild(h("div",{style:"margin-bottom:14px;"},[
   h("div",{style:"font-size:11px;letter-spacing:.2em;color:"+C.gold+";font-weight:700;"},["MY MONEY"]),
   h("h1",{style:"font-family:Georgia,serif;font-size:30px;line-height:1.05;margin-top:6px;font-weight:700;"},
     [state.tab==="month"?"Expense pots":state.tab==="bills"?"Bills":state.tab==="debts"?"Debt tracker":state.tab==="dash"?"Dashboard":"Month overview"])
 ]));
 renderDueBanner(wrap);
 var tabs=h("div",{style:"display:flex;gap:4px;background:"+C.rule+";padding:4px;border-radius:10px;margin-bottom:16px;"});
 [["dash","Dashboard"],["month","Expenses"],["bills","Bills"],["debts","Debts"],["overview","History"]].forEach(function(t){
   var on=state.tab===t[0];
   tabs.appendChild(h("button",{style:"flex:1;border:none;background:"+(on?C.card:"transparent")+";padding:10px 0;border-radius:7px;font-size:13.5px;font-weight:600;color:"+(on?C.ink:C.faint)+";"+(on?"box-shadow:0 1px 2px rgba(0,0,0,.06);":""),
     onclick:function(){state.tab=t[0];render();}},[t[1]]));
 });
 wrap.appendChild(tabs);
 wrap.appendChild(h("div",{style:"display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:99px;margin-bottom:14px;"+
   (CLOUD?"background:"+C.greenSoft+";color:"+C.green+";border:1px solid "+C.green:"background:"+C.amberSoft+";color:"+C.amber+";border:1px solid "+C.amber)},
   [CLOUD?"\u2601 SYNCED TO CLOUD":"\u26a0 THIS DEVICE ONLY"]));
 if(state.tab==="month")renderMonth(wrap);
 else if(state.tab==="bills")renderBills(wrap);
 else if(state.tab==="debts")renderDebts(wrap);
 else if(state.tab==="dash")renderDash(wrap);
 else renderOverview(wrap);
 wrap.appendChild(h("div",{style:"font-size:11px;color:"+C.faint+";text-align:center;line-height:1.5;margin-top:14px;"},
   ["Saved on this device · pots carry over · each month kept"]));
 root.appendChild(wrap);
}

function monthPicker(wrap){
 var keys=allMonthKeys();var idx=keys.indexOf(state.viewKey);
 if(idx<0){state.viewKey=nowKey();idx=keys.indexOf(state.viewKey);}
 var isLatest=idx>=keys.length-1,isEarliest=idx<=0;
 var nav=h("div",{style:"display:flex;align-items:center;gap:12px;border-top:1px solid "+C.rule+";border-bottom:1px solid "+C.rule+";padding:8px 0;margin-bottom:14px;"});
 nav.appendChild(h("button",{style:"border:none;background:none;font-size:22px;color:"+C.ink+";width:28px;height:28px;opacity:"+(isEarliest?.3:1)+";",
   onclick:function(){if(isEarliest)return;state.viewKey=keys[idx-1];render();}},["‹"]));
 nav.appendChild(h("span",{style:"flex:1;text-align:center;font-size:15px;font-weight:600;"},[labelOf(state.viewKey)+(state.viewKey===nowKey()?"  ·  now":"")]));
 nav.appendChild(h("button",{style:"border:none;background:none;font-size:22px;color:"+C.ink+";width:28px;height:28px;opacity:"+(isLatest?.3:1)+";",
   onclick:function(){if(isLatest)return;state.viewKey=keys[idx+1];render();}},["›"]));
 wrap.appendChild(nav);

       h("span",{style:"color:"+C.ink+";font-weight:600;"},[money0(debtT)+" to debt"])])
   ]);
   wrap.appendChild(head);
   if(open){
     var panel=h("div",{style:"background:"+C.card+";border:1px solid "+C.ink+";border-top:none;border-radius:0 0 12px 12px;padding:6px 15px 14px;margin-bottom:9px;"});
     var any=false;
     function section(title,bk,color){
       var rows=[];
       Object.keys(m[bk]||{}).forEach(function(id){
         (m[bk][id]||[]).forEach(function(en){
           any=true;
           rows.push(h("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid "+C.rule+";"},[
             h("span",{style:"flex:1;font-size:13px;"},[entryName(bk,id),(en.paidBy==="card"?h("span",{style:"font-size:8.5px;font-weight:800;color:"+C.red+";border:1px solid "+C.red+";border-radius:3px;padding:0 3px;margin-left:5px;"},["CARD"]):null)]),
             h("span",{style:"font-size:13.5px;font-weight:700;color:"+color+";min-width:70px;text-align:right;"},[money(en.amt)]),
             h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",
               onclick:function(){editEntry(k,bk,id,en.id);}},["edit"]),
             h("button",{style:"border:none;background:none;color:"+C.red+";font-size:11.5px;text-decoration:underline;",
               onclick:function(){delEntry(k,bk,id,en.id);}},["delete"])
           ]));
         });
       });
       if(rows.length){
         panel.appendChild(h("div",{style:"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin:10px 0 2px;"},[title]));
         rows.forEach(function(r){panel.appendChild(r);});
       }
     }
     // cash-in entries
     (function(){var rows=[];(m.cash||[]).forEach(function(en){any=true;
       rows.push(h("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid "+C.rule+";"},[
         h("span",{style:"flex:1;font-size:13px;"},["Cash in (pay/income)"]),
         h("span",{style:"font-size:13.5px;font-weight:700;color:"+C.blue+";min-width:70px;text-align:right;"},[money(en.amt)]),
         h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",onclick:function(){editCash(k,en.id);}},["edit"]),
         h("button",{style:"border:none;background:none;color:"+C.red+";font-size:11.5px;text-decoration:underline;",onclick:function(){delCash(k,en.id);}},["delete"])]));});
       if(rows.length){panel.appendChild(h("div",{style:"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin:10px 0 2px;"},["Cash in"]));rows.forEach(function(r){panel.appendChild(r);});}
     })();
     section("Added to pots","in",C.green);
     section("Spent from pots","out",C.red);
     section("Debt payments","payments",C.ink);
     (function(){var rows=[];Object.keys(m.charges||{}).forEach(function(id){(m.charges[id]||[]).forEach(function(en){any=true;
       rows.push(h("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid "+C.rule+";"},[
         h("span",{style:"flex:1;font-size:13px;color:"+C.red+";"},["Card charge \u2014 "+entryName("payments",id)]),
         h("span",{style:"font-size:13.5px;font-weight:700;color:"+C.red+";min-width:70px;text-align:right;"},["+"+money(en.amt)]),
         h("button",{style:"border:none;background:none;color:"+C.faint+";font-size:11.5px;text-decoration:underline;",onclick:function(){editCharge(k,id,en.id);}},["edit"]),
         h("button",{style:"border:none;background:none;color:"+C.red+";font-size:11.5px;text-decoration:underline;",onclick:function(){delCharge(k,id,en.id);}},["delete"])]));});});
       if(rows.length){panel.appendChild(h("div",{style:"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:"+C.faint+";font-weight:700;margin:10px 0 2px;"},["Card charges (new debt)"]));rows.forEach(function(r){panel.appendChild(r);});}
     })();
     if(!any)panel.appendChild(h("div",{style:"font-size:12.5px;color:"+C.faint+";padding:12px 0;"},["No entries logged this month yet."]));
     wrap.appendChild(panel);
   }
 });
}

render();
cloudLoad(function(){refreshFromStore();ensureMonth(nowKey());render();});
</script>
