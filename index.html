function money(n){n=n||0;return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ===== WEEKS: fixed, Week 1 = 1 Jul 2026 ===== */
var WEEK1=new Date(2026,6,1); // Jul 1 2026
var NWEEKS=13;
function weekDates(){var a=[];for(var i=0;i<NWEEKS;i++){var d=new Date(WEEK1);d.setDate(d.getDate()+i*7);a.push(d);}return a;}
function weekRange(i){var s=new Date(WEEK1);s.setDate(s.getDate()+i*7);var e=new Date(s);e.setDate(e.getDate()+6);return [s,e];}
function wlabel(d){return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}
function currentWeekIndex(){var now=new Date();now.setHours(0,0,0,0);for(var i=0;i<NWEEKS;i++){var r=weekRange(i);if(now>=r[0]&&now<=r[1])return i;}return now<WEEK1?0:NWEEKS-1;}

/* ===== freq conversions ===== */
function monthlyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt*52/12:freq==="Fortnightly"?amt*26/12:freq==="Monthly"?amt:freq==="Quarterly"?amt/3:freq==="Annually"?amt/12:amt;}
function weeklyEq(amt,freq){amt=amt||0;return freq==="Weekly"?amt:freq==="Fortnightly"?amt/2:freq==="Monthly"?amt*12/52:freq==="Quarterly"?amt*4/52:freq==="Annually"?amt/52:amt;}
function nextDue(day){if(!day||day<1)return null;var now=new Date();now.setHours(0,0,0,0);for(var add=0;add<70;add++){var d=new Date(now);d.setDate(d.getDate()+add);if(d.getDate()===day)return d;}return null;}
function daysUntil(day){var d=nextDue(day);if(!d)return null;return Math.round((d-new Date().setHours(0,0,0,0))/86400000);}

/* ===== weekly grid totals ===== */
function cellKey(catId,wi){return catId+"|"+wi;}
function getCell(catId,wi){return cells[cellKey(catId,wi)]||null;}
function weekIncome(wi){var s=0;cats.forEach(function(c){if(c.kind==="income"){var e=getCell(c.id,wi);if(e)s+=e.amt;}});return s;}
function weekCashOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="cash")s+=e.amt;}});return s;}
function weekCardOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="card")s+=e.amt;}});return s;}
function weekAfterOut(wi){var s=0;cats.forEach(function(c){if(c.kind==="expense"){var e=getCell(c.id,wi);if(e&&e.method==="after")s+=e.amt;}});return s;}
function runningCash(wi){var bal=settings.opening||0;for(var i=0;i<=wi;i++){bal+=weekIncome(i)-weekCashOut(i);}return bal;}
function ccBalance(){var bal=settings.ccStart||0;for(var i=0;i<NWEEKS;i++)bal+=weekCardOut(i);return bal;}
function apBalance(){var bal=settings.apStart||0;for(var i=0;i<NWEEKS;i++)bal+=weekAfterOut(i);return bal;}

 (kids||[]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
 return e;}
